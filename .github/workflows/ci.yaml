name: CI

on:
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check Rust formatting
        run: nix develop --command cargo fmt --all -- --check

  toml-format:
    name: TOML Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check TOML formatting
        run: nix develop --command taplo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run Clippy
        run: nix develop --command cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run tests
        run: nix develop --command cargo test --all-features --verbose

  build:
    name: Nix Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build node package
        run: nix build

  e2e:
    name: Consensus E2E Repeated (PR)
    runs-on: ubuntu-latest
    needs: [test, build]
    timeout-minutes: 80
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run repeated consensus e2e tests (3x each)
        env:
          RUNS: 3
          ARTIFACTS_DIR: artifacts/consensus-e2e/pr
          RUST_LOG_LEVEL: info
        run: nix develop --command bash scripts/ci/run_consensus_e2e_repeated.sh

      - name: Upload consensus e2e artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consensus-e2e-pr-logs
          path: artifacts/consensus-e2e/pr
          if-no-files-found: error

      - name: Publish e2e summary
        if: always()
        run: |
          {
            echo "## Consensus E2E Repeated (PR)"
            echo ""
            echo '```'
            cat artifacts/consensus-e2e/pr/summary.tsv
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
